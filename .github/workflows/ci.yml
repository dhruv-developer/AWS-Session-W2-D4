name: AWS CI/CD

on:
  push:
    branches:
      - main

  # pull_request:
  #   branches:
  #     - main

jobs:

  build:

    runs-on: ubuntu-latest # Github virtually provides a temporary machine on Ubuntu

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build Docker Image
      run: |
        docker build -t aws .

    # - name: Testing
    #   run: |
    #     pytest

    - name: Success
      run: |
        echo "Pipeline Completed Successfully!"